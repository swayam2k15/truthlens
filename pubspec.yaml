name: truthlens
description: >
  TruthLens — Tamper-proof, timestamped proof-of-life camera app.
  C2PA-compliant digital signatures, RFC 3161 trusted timestamps,
  blockchain anchoring, and device attestation for verifiable media authenticity.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Media
  camera: ^0.11.0+2
  image: ^4.1.4
  video_player: ^2.8.2
  photo_manager: ^3.0.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7

  # Cryptography & Security
  pointycastle: ^3.7.4
  crypto: ^3.0.3
  cryptography: ^2.7.0
  asn1lib: ^1.5.3
  x509: ^0.2.4
  basic_utils: ^5.7.0
  encrypt: ^5.0.3

  # Blockchain / Web3
  web3dart: ^2.7.3
  http: ^1.2.0
  bip39: ^1.0.6
  ed25519_hd_key: ^2.3.0
  hex: ^0.2.0

  # Location & Sensors
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  sensors_plus: ^4.0.2

  # Storage & State
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI & UX
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.4
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

  # Networking
  dio: ^5.4.1
  connectivity_plus: ^6.0.2

  # Device Info & Attestation
  device_info_plus: ^10.1.0
  package_info_plus: ^9.0.0
  platform: ^3.1.4

  # Utilities
  uuid: ^4.3.3
  logger: ^2.0.2+1
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
    - assets/animations/
